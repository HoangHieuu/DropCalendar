name: Backend production promotion

on:
  workflow_dispatch:
    inputs:
      staging_image_digest:
        description: Tested staging image including @sha256 digest
        required: true
        type: string
      confirmation:
        description: Type PROMOTE to send production traffic
        required: true
        type: string

concurrency:
  group: snapcal-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  REGION: asia-southeast1
  SERVICE: snapcal-api-production
  MIGRATION_JOB: snapcal-migrate-production

jobs:
  promote:
    if: inputs.confirmation == 'PROMOTE' && contains(inputs.staging_image_digest, '@sha256:')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Copy the tested bytes into the isolated production registry
        id: image
        env:
          SOURCE_IMAGE: ${{ inputs.staging_image_digest }}
          STAGING_PROJECT_ID: ${{ vars.STAGING_GCP_PROJECT_ID }}
          PRODUCTION_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          expected="${REGION}-docker.pkg.dev/${STAGING_PROJECT_ID}/snapcal-backend/api@sha256:"
          if [[ "${SOURCE_IMAGE}" != "${expected}"* ]]; then
            echo "The source image is not from SnapCal's staging registry." >&2
            exit 64
          fi
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          target="${REGION}-docker.pkg.dev/${PRODUCTION_PROJECT_ID}/snapcal-backend/api:promoted-${GITHUB_RUN_ID}"
          docker pull "${SOURCE_IMAGE}"
          docker tag "${SOURCE_IMAGE}" "${target}"
          docker push "${target}"
          digest="$(gcloud artifacts docker images describe "${target}" --format='value(image_summary.fully_qualified_digest)')"
          echo "digest=${digest}" >>"${GITHUB_OUTPUT}"
      - name: Run backward-compatible migration
        run: |
          gcloud run jobs deploy "${MIGRATION_JOB}" \
            --image "${{ steps.image.outputs.digest }}" \
            --region "${REGION}" \
            --service-account "${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}" \
            --set-secrets 'DATABASE_URL=snapcal-production-database-url:latest' \
            --command alembic \
            --args upgrade,head \
            --max-retries 0 \
            --task-timeout 5m \
            --quiet
          gcloud run jobs execute "${MIGRATION_JOB}" --region "${REGION}" --wait --quiet
      - name: Deploy production candidate without traffic
        id: deploy
        run: |
          gcloud run services update "${SERVICE}" \
            --image "${{ steps.image.outputs.digest }}" \
            --region "${REGION}" \
            --no-traffic \
            --tag candidate \
            --quiet
          url="$(gcloud run services describe "${SERVICE}" --region "${REGION}" --format='value(status.traffic[?tag=candidate].url)')"
          revision="$(gcloud run services describe "${SERVICE}" --region "${REGION}" --format='value(status.latestCreatedRevisionName)')"
          echo "url=${url}" >>"${GITHUB_OUTPUT}"
          echo "revision=${revision}" >>"${GITHUB_OUTPUT}"
      - name: Smoke production candidate
        run: |
          curl --fail --silent --show-error --retry 6 --retry-all-errors \
            "${{ steps.deploy.outputs.url }}/health/live"
          curl --fail --silent --show-error --retry 6 --retry-all-errors \
            "${{ steps.deploy.outputs.url }}/health/ready"
      - name: Promote and preserve revision rollback
        run: >-
          gcloud run services update-traffic "${SERVICE}"
          --region "${REGION}"
          --to-revisions "${{ steps.deploy.outputs.revision }}=100"
          --quiet
