name: Pull request verification

on:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: snapcal_test
          POSTGRES_USER: snapcal
          POSTGRES_PASSWORD: snapcal-test-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U snapcal -d snapcal_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            services/extraction-api/requirements.txt
            services/extraction-api/requirements-dev.txt
      - run: python -m pip install -r services/extraction-api/requirements-dev.txt pip-audit
      - name: Validate migrations against PostgreSQL 17
        working-directory: services/extraction-api
        env:
          DATABASE_URL: postgresql+asyncpg://snapcal:snapcal-test-only@127.0.0.1:5432/snapcal_test
        run: |
          alembic upgrade head
          alembic check
      - name: Run backend and benchmark tests
        env:
          PYTHONPATH: ${{ github.workspace }}/packages/benchmark
          SNAPCAL_TEST_DATABASE_URL: postgresql+asyncpg://snapcal:snapcal-test-only@127.0.0.1:5432/snapcal_test
        run: python -m pytest services/extraction-api/tests packages/benchmark/tests -q
      - run: pip-audit -r services/extraction-api/requirements.txt

  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Test SnapCal
        run: >-
          xcodebuild -project SnapCal.xcodeproj -scheme SnapCal
          -destination 'platform=macOS'
          -packageAuthorizationProvider netrc
          -disableAutomaticPackageResolution
          -onlyUsePackageVersionsFromResolvedFile
          -derivedDataPath .build/DerivedData
          -parallel-testing-enabled NO
          CODE_SIGNING_ALLOWED=NO test
      - name: Compile production configuration without signing
        run: >-
          xcodebuild -project SnapCal.xcodeproj -scheme SnapCal
          -configuration Release -destination 'platform=macOS'
          -packageAuthorizationProvider netrc
          -disableAutomaticPackageResolution
          -onlyUsePackageVersionsFromResolvedFile
          -derivedDataPath .build/ReleaseDerivedData
          CODE_SIGNING_ALLOWED=NO build

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
