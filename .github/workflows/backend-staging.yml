name: Backend staging

on:
  push:
    branches: [main]
    paths:
      - "services/extraction-api/**"
      - "infra/terraform/**"
      - ".github/workflows/backend-staging.yml"

concurrency:
  group: snapcal-staging
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  REGION: asia-southeast1
  SERVICE: snapcal-api-staging
  MIGRATION_JOB: snapcal-migrate-staging

jobs:
  provider-fake-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: snapcal_test
          POSTGRES_USER: snapcal
          POSTGRES_PASSWORD: snapcal-test-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U snapcal -d snapcal_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            services/extraction-api/requirements.txt
            services/extraction-api/requirements-dev.txt
      - run: python -m pip install -r services/extraction-api/requirements-dev.txt
      - name: Exercise API, database locking, quota, and provider fake
        env:
          SNAPCAL_TEST_DATABASE_URL: postgresql+asyncpg://snapcal:snapcal-test-only@127.0.0.1:5432/snapcal_test
        run: python -m pytest services/extraction-api/tests/test_v2_api.py -q

  deploy:
    needs: provider-fake-smoke
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
      - uses: docker/setup-buildx-action@v3
      - name: Authorize Docker
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
      - name: Build immutable backend image
        id: image
        working-directory: services/extraction-api
        run: |
          image="${REGION}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/snapcal-backend/api:${GITHUB_SHA}"
          docker build --tag "${image}" .
          docker push "${image}"
          digest="$(gcloud artifacts docker images describe "${image}" --format='value(image_summary.fully_qualified_digest)')"
          echo "digest=${digest}" >>"${GITHUB_OUTPUT}"
      - name: Run migration before traffic
        run: |
          gcloud run jobs deploy "${MIGRATION_JOB}" \
            --image "${{ steps.image.outputs.digest }}" \
            --region "${REGION}" \
            --service-account "${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}" \
            --set-secrets 'DATABASE_URL=snapcal-staging-database-url:latest' \
            --command alembic \
            --args upgrade,head \
            --max-retries 0 \
            --task-timeout 5m \
            --quiet
          gcloud run jobs execute "${MIGRATION_JOB}" --region "${REGION}" --wait --quiet
      - name: Deploy a no-traffic staging revision
        id: deploy
        run: |
          gcloud run services update "${SERVICE}" \
            --image "${{ steps.image.outputs.digest }}" \
            --region "${REGION}" \
            --no-traffic \
            --tag candidate \
            --quiet
          url="$(gcloud run services describe "${SERVICE}" --region "${REGION}" --format='value(status.traffic[?tag=candidate].url)')"
          revision="$(gcloud run services describe "${SERVICE}" --region "${REGION}" --format='value(status.latestCreatedRevisionName)')"
          echo "url=${url}" >>"${GITHUB_OUTPUT}"
          echo "revision=${revision}" >>"${GITHUB_OUTPUT}"
      - name: Smoke candidate revision
        run: |
          curl --fail --silent --show-error --retry 6 --retry-all-errors \
            "${{ steps.deploy.outputs.url }}/health/live"
          curl --fail --silent --show-error --retry 6 --retry-all-errors \
            "${{ steps.deploy.outputs.url }}/health/ready"
      - name: Promote tested revision
        run: >-
          gcloud run services update-traffic "${SERVICE}"
          --region "${REGION}"
          --to-revisions "${{ steps.deploy.outputs.revision }}=100"
          --quiet
